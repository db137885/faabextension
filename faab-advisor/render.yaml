services:
  - type: web
    name: faab-advisor-api
    plan: free
    env: node
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma db push && node prisma/seed.js
    startCommand: node src/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 10000
