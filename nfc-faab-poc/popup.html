<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            width: 280px;
            padding: 16px;
            background-color: #111827;
            color: #f3f4f6;
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
        }
        h2 {
            margin: 0 0 12px 0;
            font-size: 16px;
            color: #38bdf8;
            font-weight: 700;
        }
        p {
            font-size: 13px;
            color: #9ca3af;
            line-height: 1.4;
        }
        .status-container {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #374151;
        }
        .status {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            background-color: rgba(16, 185, 129, 0.1);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }
        .status::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #34d399;
            border-radius: 50%;
            margin-right: 6px;
            box-shadow: 0 0 8px #34d399;
        }
    </style>
</head>
<body>
    <h2>⚡ FAAB Advisor</h2>
    <p>The Chrome Extension is successfully loaded and running locally.</p>
    <div class="status-container">
        <div class="status">Active on NFC</div>
    </div>
</body>
</html>
